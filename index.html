<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Runa - Playhit 2026/title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --bg-dark: #0f172a;
            --amber-bright: #fbbf24;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .digital-font { font-family: 'Orbitron', sans-serif; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Capa de Presentación */
        #slidesOverlay {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }

        .overlay-hidden { transform: translateY(100%); }
        .overlay-visible { transform: translateY(0); }

        .score-card { transition: all 0.3s ease; border: 4px solid transparent; }
        
        .score-animate-up { animation: pulse-green 0.5s ease; }
        .score-animate-down { animation: pulse-red 0.5s ease; }

        @keyframes pulse-green {
            0% { border-color: #22c55e; box-shadow: 0 0 20px #22c55e; }
            100% { border-color: transparent; box-shadow: none; }
        }
        @keyframes pulse-red {
            0% { border-color: #ef4444; box-shadow: 0 0 20px #ef4444; }
            100% { border-color: transparent; box-shadow: none; }
        }

        .timer-input {
            background: transparent; border: none; color: inherit; text-align: center;
            width: 100%; outline: none; cursor: pointer;
        }

        .timer-urgent {
            color: #ef4444 !important;
            animation: urgent-blink 0.5s infinite alternate;
        }

        @keyframes urgent-blink {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0.7; transform: scale(1.05); }
        }

        .preset-btn {
            @apply px-4 py-1 text-xs font-bold rounded-full bg-amber-500/10 border border-amber-500/30 hover:bg-amber-500/20 text-amber-500 transition active:scale-95;
        }

        iframe { background: #000; }
    </style>
</head>
<body class="p-4">

    <!-- OVERLAY DE LA PRESENTACIÓN GOOGLE SLIDES -->
    <div id="slidesOverlay" class="fixed inset-0 bg-black overlay-hidden flex flex-col">
        <div class="p-3 glass-panel flex justify-between items-center border-b border-white/10">
            <div class="flex items-center gap-4">
                <div class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></div>
                <span class="text-amber-500 font-bold tracking-widest text-sm uppercase">Modo Presentación Activo</span>
            </div>
            <button onclick="toggleSlides()" class="bg-amber-500 hover:bg-amber-400 text-slate-900 px-8 py-2 rounded-full font-black transition transform active:scale-95 shadow-[0_0_15px_rgba(251,191,36,0.4)]">
                VOLVER AL MARCADOR
            </button>
        </div>
        <div class="flex-grow">
            <iframe 
                src="https://docs.google.com/presentation/d/e/2PACX-1vRMebjkU1zzQlxWSqNrQGA31dp1qZXodgRVhPoW_m9BCrpIu3fsVvcAlQI21-Z6o6nyT5GDE5NjkWO5/pubembed?start=false&loop=false&delayms=60000" 
                frameborder="0" 
                class="w-full h-full" 
                allowfullscreen="true" 
                mozallowfullscreen="true" 
                webkitallowfullscreen="true">
            </iframe>
        </div>
    </div>

    <!-- INTERFAZ DEL MARCADOR -->
    <div id="mainContainer" class="w-full max-w-6xl flex flex-col gap-6">
        
        <div class="grid grid-cols-3 items-center gap-4">
            <div></div>

            <!-- Temporizador Central -->
            <div id="timerContainer" class="glass-panel p-6 rounded-3xl flex flex-col items-center border-2 border-amber-500/30">
                <!-- Selectores de tiempo directo -->
                <div class="flex gap-3 mb-4">
                    <button onclick="setTimerPreset(30)" class="preset-btn">30 SEG</button>
                    <button onclick="setTimerPreset(60)" class="preset-btn">1 MINUTO</button>
                </div>

                <div id="timerWrapper" class="digital-font text-6xl font-bold text-amber-400 mb-6 transition-colors duration-300">
                    <input type="text" id="timerDisplay" class="timer-input" value="01:00" maxlength="5" readonly>
                </div>

                <div class="flex gap-4">
                    <button id="timerToggle" class="bg-amber-500 hover:bg-amber-400 text-slate-900 px-8 py-2 rounded-full font-bold text-sm transition shadow-lg" onclick="toggleTimer()">INICIAR</button>
                    <button id="timerReset" class="border border-gray-500 hover:bg-white/10 px-8 py-2 rounded-full font-bold text-sm transition" onclick="resetTimer()">RESET</button>
                </div>
            </div>

            <!-- Acceso a Diapositivas -->
            <div class="flex justify-end pr-4">
                <button onclick="toggleSlides()" class="glass-panel p-4 rounded-2xl hover:bg-amber-500/10 transition group flex flex-col items-center border border-amber-500/20">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-500 group-hover:scale-110 transition"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                    <span class="text-[10px] mt-1 font-bold text-gray-300 uppercase tracking-tighter">Ver Diapositivas</span>
                </button>
            </div>
        </div>

        <!-- Área de Competencia -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Equipo A -->
            <div id="teamAContainer" class="score-card glass-panel rounded-[2.5rem] p-8 flex flex-col items-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-3 bg-blue-500"></div>
                <input type="text" value="EQUIPO A" class="bg-transparent text-4xl font-bold text-center w-full focus:outline-none mb-6 uppercase tracking-tighter">
                <div id="scoreA" class="digital-font text-[10rem] font-black mb-8 leading-none select-none">0</div>
                <div class="flex gap-6 w-full">
                    <button onclick="updateScore('A', -5)" class="flex-1 bg-slate-800 hover:bg-red-500/20 py-8 rounded-3xl text-4xl font-bold border-2 border-slate-700 transition active:scale-95">-5</button>
                    <button onclick="updateScore('A', 5)" class="flex-1 bg-slate-800 hover:bg-green-500/20 py-8 rounded-3xl text-4xl font-bold border-2 border-slate-700 transition active:scale-95">+5</button>
                </div>
            </div>

            <!-- Equipo B -->
            <div id="teamBContainer" class="score-card glass-panel rounded-[2.5rem] p-8 flex flex-col items-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-3 bg-pink-500"></div>
                <input type="text" value="EQUIPO B" class="bg-transparent text-4xl font-bold text-center w-full focus:outline-none mb-6 uppercase tracking-tighter">
                <div id="scoreB" class="digital-font text-[10rem] font-black mb-8 leading-none select-none">0</div>
                <div class="flex gap-6 w-full">
                    <button onclick="updateScore('B', -5)" class="flex-1 bg-slate-800 hover:bg-red-500/20 py-8 rounded-3xl text-4xl font-bold border-2 border-slate-700 transition active:scale-95">-5</button>
                    <button onclick="updateScore('B', 5)" class="flex-1 bg-slate-800 hover:bg-green-500/20 py-8 rounded-3xl text-4xl font-bold border-2 border-slate-700 transition active:scale-95">+5</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Estado global
        const INITIAL_DEFAULT = 60;
        const gameState = {
            scores: { A: 0, B: 0 },
            timer: { 
                seconds: INITIAL_DEFAULT, 
                isRunning: false, 
                interval: null, 
                lastSetTime: INITIAL_DEFAULT,
                tickPhase: 0 
            }
        };

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // Control de la capa de presentación
        function toggleSlides() {
            const overlay = document.getElementById('slidesOverlay');
            overlay.classList.toggle('overlay-hidden');
            overlay.classList.toggle('overlay-visible');
        }

        // Actualización de puntuaciones
        function updateScore(team, points) {
            const newScore = gameState.scores[team] + points;
            if (newScore < 0) return;
            gameState.scores[team] = newScore;
            document.getElementById(`score${team}`).innerText = newScore;
            
            const container = document.getElementById(`team${team}Container`);
            if (points > 0) {
                playSfx('correct');
                container.classList.add('score-animate-up');
                setTimeout(() => container.classList.remove('score-animate-up'), 500);
            } else {
                playSfx('incorrect');
                container.classList.add('score-animate-down');
                setTimeout(() => container.classList.remove('score-animate-down'), 500);
            }
        }

        // Configurar tiempo preestablecido
        function setTimerPreset(seconds) {
            gameState.timer.lastSetTime = seconds;
            resetTimerLogic(seconds);
        }

        // Lógica de reinicio del temporizador
        function resetTimerLogic(s) {
            clearInterval(gameState.timer.interval);
            gameState.timer.isRunning = false;
            gameState.timer.seconds = s;
            gameState.timer.tickPhase = 0;
            const display = document.getElementById('timerDisplay');
            const wrapper = document.getElementById('timerWrapper');
            display.value = formatSeconds(s);
            wrapper.classList.remove('timer-urgent');
            document.getElementById('timerToggle').innerText = 'INICIAR';
        }

        // Inicio/Pausa del temporizador
        function toggleTimer() {
            const btn = document.getElementById('timerToggle');
            const wrapper = document.getElementById('timerWrapper');

            if (gameState.timer.isRunning) {
                clearInterval(gameState.timer.interval);
                btn.innerText = 'REANUDAR';
            } else {
                if (gameState.timer.seconds <= 0) return;

                gameState.timer.interval = setInterval(() => {
                    const isUrgent = gameState.timer.seconds <= 10;
                    
                    if (isUrgent) {
                        wrapper.classList.add('timer-urgent');
                        playTick(true); // Tic rápido
                        
                        if (gameState.timer.tickPhase === 1) {
                            decrementSeconds();
                            gameState.timer.tickPhase = 0;
                        } else {
                            gameState.timer.tickPhase = 1;
                        }
                    } else {
                        wrapper.classList.remove('timer-urgent');
                        if (gameState.timer.tickPhase === 1) {
                            playTick(false); // Tic normal
                            decrementSeconds();
                            gameState.timer.tickPhase = 0;
                        } else {
                            gameState.timer.tickPhase = 1;
                        }
                    }

                    if (gameState.timer.seconds <= 0 && gameState.timer.isRunning) {
                        finishTimer(btn, wrapper);
                    }
                }, 500);
                btn.innerText = 'PAUSAR';
            }
            gameState.timer.isRunning = !gameState.timer.isRunning;
        }

        function decrementSeconds() {
            if (gameState.timer.seconds > 0) {
                gameState.timer.seconds--;
                document.getElementById('timerDisplay').value = formatSeconds(gameState.timer.seconds);
            }
        }

        function finishTimer(btn, wrapper) {
            clearInterval(gameState.timer.interval);
            playSfx('horn');
            btn.innerText = 'TIEMPO!';
            wrapper.classList.remove('timer-urgent');
            gameState.timer.isRunning = false;
        }

        function resetTimer() { 
            resetTimerLogic(gameState.timer.lastSetTime); 
        }
        
        function formatSeconds(s) { 
            return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; 
        }

        // Lógica de Audio (Web Audio API)
        function playTick(urgent) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            osc.frequency.setValueAtTime(urgent ? 1400 : 800, audioCtx.currentTime);
            gain.gain.setValueAtTime(urgent ? 0.02 : 0.01, audioCtx.currentTime);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function playSfx(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'correct') {
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.2);
            } else if (type === 'incorrect') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(220, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(110, audioCtx.currentTime + 0.3);
            } else if (type === 'horn') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 1.2); return;
            }
            
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }
    </script>
</body>
</html>
