<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcador Electrónico Game Show</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --bg-dark: #0f172a;
            --accent-gold: #fbbf24;
            --lightning-red: #ef4444;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .digital-font {
            font-family: 'Orbitron', sans-serif;
        }

        .score-card {
            transition: all 0.3s ease;
            border: 4px solid transparent;
        }

        /* Animaciones para cambio de puntuación */
        .score-animate-up {
            animation: pulse-green 0.5s ease;
        }

        .score-animate-down {
            animation: pulse-red 0.5s ease;
        }

        @keyframes pulse-green {
            0% { transform: scale(1); border-color: #22c55e; box-shadow: 0 0 20px #22c55e; }
            100% { transform: scale(1); border-color: transparent; box-shadow: none; }
        }

        @keyframes pulse-red {
            0% { transform: scale(1); border-color: #ef4444; box-shadow: 0 0 20px #ef4444; }
            100% { transform: scale(1); border-color: transparent; box-shadow: none; }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .timer-input {
            background: transparent;
            border: none;
            color: inherit;
            font-family: inherit;
            text-align: center;
            width: 100%;
            outline: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .timer-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
        }
    </style>
</head>
<body class="p-4">

    <div id="mainContainer" class="w-full max-w-6xl flex flex-col gap-6">
        <!-- Cabecera y Temporizador -->
        <div class="grid grid-cols-3 items-center gap-4">
            <div class="glass-panel p-4 rounded-2xl flex flex-col items-center">
                <span class="text-xs uppercase tracking-widest text-gray-400 mb-2">Ronda Actual</span>
                <select id="roundSelector" class="bg-transparent text-xl font-bold border-b-2 border-amber-500 focus:outline-none cursor-pointer" onchange="updateTimerByRound()">
                    <option value="1" class="bg-slate-900">RONDA 1</option>
                    <option value="2" class="bg-slate-900">RONDA 2</option>
                    <option value="3" class="bg-slate-900">RONDA 3</option>
                    <option value="4" class="bg-slate-900">RONDA 4</option>
                    <option value="lightning" class="bg-red-900 text-red-100 font-black">RONDA RELÁMPAGO</option>
                </select>
            </div>

            <div id="timerContainer" class="glass-panel p-6 rounded-3xl flex flex-col items-center border-2 border-amber-500/30">
                <div class="digital-font text-6xl font-bold text-amber-400 mb-2 flex items-center">
                    <input type="text" id="timerDisplay" class="timer-input" value="01:00" maxlength="5">
                </div>
                <div class="flex gap-4">
                    <button id="timerToggle" class="bg-amber-500 hover:bg-amber-600 text-slate-900 px-4 py-1 rounded-full font-bold text-sm transition" onclick="toggleTimer()">INICIAR</button>
                    <button id="timerReset" class="border border-gray-500 hover:bg-gray-500/20 px-4 py-1 rounded-full font-bold text-sm transition" onclick="resetTimer()">RESET</button>
                </div>
            </div>

            <div class="flex justify-end pr-4">
                <div class="text-right">
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest">Estado del Juego</p>
                    <p id="gameStatus" class="text-xs font-bold text-green-500">LISTO</p>
                </div>
            </div>
        </div>

        <!-- Marcadores de Equipos -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Equipo A -->
            <div id="teamAContainer" class="score-card glass-panel rounded-[2.5rem] p-8 flex flex-col items-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-3 bg-blue-500"></div>
                <input type="text" value="EQUIPO ALFA" class="bg-transparent text-3xl font-bold text-center w-full focus:outline-none mb-4 uppercase">
                <div id="scoreA" class="digital-font text-9xl font-black mb-8 select-none">0</div>
                <div class="flex gap-6 w-full">
                    <button onclick="updateScore('A', -5)" class="flex-1 bg-slate-800 hover:bg-red-500/20 py-6 rounded-2xl text-4xl font-bold border-2 border-slate-700 transition-all">-5</button>
                    <button onclick="updateScore('A', 5)" class="flex-1 bg-slate-800 hover:bg-green-500/20 py-6 rounded-2xl text-4xl font-bold border-2 border-slate-700 transition-all">+5</button>
                </div>
            </div>

            <!-- Equipo B -->
            <div id="teamBContainer" class="score-card glass-panel rounded-[2.5rem] p-8 flex flex-col items-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-3 bg-pink-500"></div>
                <input type="text" value="EQUIPO BETA" class="bg-transparent text-3xl font-bold text-center w-full focus:outline-none mb-4 uppercase">
                <div id="scoreB" class="digital-font text-9xl font-black mb-8 select-none">0</div>
                <div class="flex gap-6 w-full">
                    <button onclick="updateScore('B', -5)" class="flex-1 bg-slate-800 hover:bg-red-500/20 py-6 rounded-2xl text-4xl font-bold border-2 border-slate-700 transition-all">-5</button>
                    <button onclick="updateScore('B', 5)" class="flex-1 bg-slate-800 hover:bg-green-500/20 py-6 rounded-2xl text-4xl font-bold border-2 border-slate-700 transition-all">+5</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Estado Global ---
        const gameState = {
            scores: { A: 0, B: 0 },
            timer: {
                seconds: 60,
                isRunning: false,
                interval: null,
                lastSetTime: 60
            }
        };

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const timerDisplay = document.getElementById('timerDisplay');
        const statusText = document.getElementById('gameStatus');

        // --- Lógica de Puntuación ---
        function updateScore(team, points) {
            const newScore = gameState.scores[team] + points;
            if (newScore < 0) return;
            
            gameState.scores[team] = newScore;
            document.getElementById(`score${team}`).innerText = newScore;
            
            const container = document.getElementById(`team${team}Container`);
            if (points > 0) {
                playSfx('correct');
                container.classList.add('score-animate-up');
                setTimeout(() => container.classList.remove('score-animate-up'), 500);
            } else {
                playSfx('incorrect');
                container.classList.add('score-animate-down');
                setTimeout(() => container.classList.remove('score-animate-down'), 500);
            }
        }

        // --- Lógica del Temporizador ---
        function formatSeconds(seconds) {
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            return `${mins}:${secs}`;
        }

        function timeToSeconds(timeStr) {
            const parts = timeStr.split(':');
            if (parts.length !== 2) return 0;
            return parseInt(parts[0]) * 60 + parseInt(parts[1]);
        }

        /**
         * Ajusta el tiempo según la ronda seleccionada.
         */
        function updateTimerByRound() {
            const round = document.getElementById('roundSelector').value;
            let seconds = 0; 
            
            if (round === "1" || round === "lightning") {
                seconds = 60; // 1 min
            } else if (round === "3") {
                seconds = 30; // 30 seg
            } else if (round === "2" || round === "4") {
                seconds = 0; // Cero
            }
            
            clearInterval(gameState.timer.interval);
            gameState.timer.isRunning = false;
            gameState.timer.seconds = seconds;
            gameState.timer.lastSetTime = seconds;
            timerDisplay.value = formatSeconds(seconds);
            document.getElementById('timerToggle').innerText = 'INICIAR';
            statusText.innerText = 'LISTO';
            statusText.className = 'text-xs font-bold text-green-500';
        }

        timerDisplay.addEventListener('change', (event) => {
            const newSeconds = timeToSeconds(event.target.value);
            if (!isNaN(newSeconds) && newSeconds >= 0) {
                gameState.timer.seconds = newSeconds;
                gameState.timer.lastSetTime = newSeconds;
                timerDisplay.value = formatSeconds(newSeconds);
            }
        });

        function toggleTimer() {
            const toggleButton = document.getElementById('timerToggle');
            if (gameState.timer.isRunning) {
                clearInterval(gameState.timer.interval);
                toggleButton.innerText = 'REANUDAR';
                statusText.innerText = 'PAUSADO';
                statusText.className = 'text-xs font-bold text-amber-500';
            } else {
                if (gameState.timer.seconds <= 0) return;
                
                statusText.innerText = 'EN CURSO';
                statusText.className = 'text-xs font-bold text-blue-500';
                
                gameState.timer.interval = setInterval(() => {
                    if (gameState.timer.seconds > 0) {
                        gameState.timer.seconds--;
                        playTick();
                        timerDisplay.value = formatSeconds(gameState.timer.seconds);
                    } else {
                        clearInterval(gameState.timer.interval);
                        playSfx('horn');
                        toggleButton.innerText = 'TIEMPO!';
                        statusText.innerText = 'FINALIZADO';
                        statusText.className = 'text-xs font-bold text-red-500';
                        gameState.timer.isRunning = false;
                    }
                }, 1000);
                toggleButton.innerText = 'PAUSAR';
            }
            gameState.timer.isRunning = !gameState.timer.isRunning;
        }

        function resetTimer() {
            clearInterval(gameState.timer.interval);
            gameState.timer.isRunning = false;
            gameState.timer.seconds = gameState.timer.lastSetTime;
            timerDisplay.value = formatSeconds(gameState.timer.seconds);
            document.getElementById('timerToggle').innerText = 'INICIAR';
            statusText.innerText = 'LISTO';
            statusText.className = 'text-xs font-bold text-green-500';
        }

        // --- Generación de Sonidos (Web Audio API) ---
        function playSfx(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
            
            if (type === 'correct') {
                oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.2);
            } else if (type === 'incorrect') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(220, audioCtx.currentTime);
                oscillator.frequency.linearRampToValueAtTime(110, audioCtx.currentTime + 0.3);
            } else if (type === 'horn') {
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(100, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                oscillator.start(); oscillator.stop(audioCtx.currentTime + 1); return;
            }
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.3);
        }

        function playTick() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.01, audioCtx.currentTime);
            oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.05);
        }
    </script>
</body>
</html>
